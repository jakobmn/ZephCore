# ProMicro LR2021 — nRF52840 SuperMini + LR2021
# SoftDevice v6 (S140 v6) — NiceNano/SuperMini bootloader uses S140 6.1.1
# 0x00B6 = S140 v6 firmware ID; app partition starts at 0x26000

CONFIG_ZEPHCORE_BOARD_NAME="ProMicro LR2021"
CONFIG_BT_DIS_MODEL_NUMBER_STR="ProMicro LR2021 nRF52840-LR2021"
CONFIG_ZEPHCORE_SD_FWID=0x00B6

# LR2021 radio driver
CONFIG_ZEPHCORE_RADIO_LR2021=y
